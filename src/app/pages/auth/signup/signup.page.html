<ion-content>
  <div class="auth-page">
    <div class="brand-box">
      <div class="logo">📈</div>
      <h1>Create Account</h1>
      <p>Start paper trading with demo balance.</p>
    </div>

    <div class="auth-card">
      <h2>Signup</h2>

      <ion-input
        label="Name"
        label-placement="floating"
        fill="outline"
        [(ngModel)]="name">
      </ion-input>

      <ion-input
        label="Email"
        label-placement="floating"
        fill="outline"
        type="email"
        [(ngModel)]="email">
      </ion-input>

      <ion-input
        label="Password"
        label-placement="floating"
        fill="outline"
        type="password"
        [(ngModel)]="password">
      </ion-input>

      <ion-button expand="block" (click)="signup()">
        Create Account
      </ion-button>

      <ion-button fill="clear" expand="block" (click)="goToLogin()">
        Already have account? Login
      </ion-button>

      <ion-text color="danger" *ngIf="errorMessage">
        <p>{{ errorMessage }}</p>
      </ion-text>
    </div>
  </div>
</ion-content>
